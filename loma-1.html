<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOM.A® — Arte Abstracto</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f7f5f2;
            --ink: #1a1a1a;
            --muted: #888;
            --border: #ddd;
            --white: #ffffff;
            --accent: #c8a96e;
        }

        body {
            background-color: var(--bg);
            color: var(--ink);
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            min-height: 100vh;
        }

        /* Grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        /* ── HEADER ── */
        header {
            text-align: center;
            padding: 56px 24px 36px;
            position: relative;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(52px, 10vw, 88px);
            font-weight: 300;
            letter-spacing: 0.18em;
            line-height: 1;
            color: var(--ink);
        }

        .logo sup {
            font-size: 0.22em;
            vertical-align: super;
            letter-spacing: 0;
            color: var(--accent);
        }

        .tagline {
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            font-size: 11px;
            letter-spacing: 0.35em;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 10px;
        }

        .header-line {
            width: 40px;
            height: 1px;
            background: var(--accent);
            margin: 20px auto 0;
        }

        /* ── UPLOAD AREA ── */
        .upload-wrap {
            max-width: 560px;
            margin: 40px auto 56px;
            padding: 0 24px;
        }

        .upload-area {
            border: 1px dashed var(--border);
            border-radius: 4px;
            padding: 36px 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s, background 0.3s;
            background: var(--white);
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: #fdfbf8;
        }

        .upload-icon {
            width: 36px;
            height: 36px;
            margin: 0 auto 12px;
            color: var(--muted);
        }

        .upload-area p {
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        .upload-area p strong {
            color: var(--ink);
            font-weight: 400;
        }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--white);
            border-radius: 6px;
            padding: 36px;
            width: 100%;
            max-width: 460px;
            animation: fadeUp 0.25s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .modal h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 0.08em;
            margin-bottom: 24px;
            color: var(--ink);
        }

        .modal-preview {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 4px;
            margin-bottom: 20px;
            background: var(--bg);
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 10px 12px;
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            font-weight: 300;
            color: var(--ink);
            background: var(--bg);
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus { border-color: var(--accent); }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 3px;
            font-family: 'Lato', sans-serif;
            font-size: 12px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.8; }

        .btn-primary {
            background: var(--ink);
            color: var(--white);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
        }

        /* ── GALLERY ── */
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 32px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px 100px;
        }

        .art-card {
            background: var(--white);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            animation: fadeIn 0.4s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .art-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .art-card img {
            width: 100%;
            aspect-ratio: 4/5;
            object-fit: cover;
            display: block;
        }

        .art-info {
            padding: 16px 18px 18px;
        }

        .art-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 400;
            font-style: italic;
            color: var(--ink);
            letter-spacing: 0.03em;
        }

        .art-price {
            font-size: 12px;
            letter-spacing: 0.12em;
            color: var(--accent);
            margin-top: 4px;
            text-transform: uppercase;
        }

        .art-price.sin-precio {
            color: var(--muted);
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.85);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            color: #999;
        }

        .art-card:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: #c0392b; }

        /* ── EMPTY STATE ── */
        #empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--muted);
            display: none;
        }

        #empty-state p {
            font-size: 13px;
            letter-spacing: 0.08em;
        }

        /* ── FOOTER ── */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(247,245,242,0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            padding: 12px 24px;
            text-align: center;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--muted);
            z-index: 10;
        }

        /* ── WHATSAPP ── */
        .whatsapp-btn {
            position: fixed;
            bottom: 56px;
            right: 20px;
            width: 52px;
            height: 52px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(37,211,102,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 50;
            text-decoration: none;
        }

        .whatsapp-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 24px rgba(37,211,102,0.5);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            #gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">LOM.A<sup>®</sup></div>
        <p class="tagline">Arte Abstracto &amp; Delicado</p>
        <div class="header-line"></div>
    </header>

    <!-- UPLOAD -->
    <div class="upload-wrap">
        <label for="fileInput" class="upload-area">
            <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <p><strong>Agregar una obra</strong></p>
            <p style="font-size:11px; margin-top:4px;">Seleccioná la foto desde tu galería</p>
        </label>
        <input type="file" id="fileInput" accept="image/*" class="hidden" style="display:none">
    </div>

    <!-- MODAL: título y precio -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Agregar obra</h2>
            <img id="modalPreview" class="modal-preview" src="" alt="Vista previa">
            <div class="field">
                <label for="inputTitle">Título de la obra</label>
                <input type="text" id="inputTitle" placeholder="Ej: Sin título Nº3">
            </div>
            <div class="field">
                <label for="inputPrice">Precio (opcional)</label>
                <input type="text" id="inputPrice" placeholder="Ej: $2.500 · Consultar">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="btnCancel">Cancelar</button>
                <button class="btn btn-primary" id="btnAdd">Agregar</button>
            </div>
        </div>
    </div>

    <!-- GALERÍA -->
    <div id="gallery"></div>
    <div id="empty-state">
        <p>Tu galería está vacía — empezá subiendo tu primera obra</p>
    </div>

    <!-- FOOTER -->
    <footer>© 2026 LOM.A® — Todos los derechos reservados</footer>

    <!-- WHATSAPP -->
    <a href="https://wa.me/59898173187?text=Hola!%20Me%20interesa%20una%20obra%20de%20LOM.A" target="_blank" class="whatsapp-btn" title="Contactar por WhatsApp">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
    </a>

    <script>
        const fileInput   = document.getElementById('fileInput');
        const gallery     = document.getElementById('gallery');
        const emptyState  = document.getElementById('empty-state');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalPreview = document.getElementById('modalPreview');
        const inputTitle  = document.getElementById('inputTitle');
        const inputPrice  = document.getElementById('inputPrice');
        const btnAdd      = document.getElementById('btnAdd');
        const btnCancel   = document.getElementById('btnCancel');

        let pendingDataUrl = null;

        // ── STORAGE ──────────────────────────────────────────────
        const STORAGE_KEY = 'loma_gallery_v1';

        function loadWorks() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            } catch { return []; }
        }

        function saveWorks(works) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(works));
            } catch(e) {
                alert('Las imágenes ocupan mucho espacio. Intentá con fotos más pequeñas.');
            }
        }

        // ── RENDER ───────────────────────────────────────────────
        function renderAll() {
            gallery.innerHTML = '';
            const works = loadWorks();
            works.forEach((work, i) => addCard(work, i));
            emptyState.style.display = works.length === 0 ? 'block' : 'none';
        }

        function addCard(work, index) {
            const card = document.createElement('div');
            card.className = 'art-card';

            const priceHtml = work.price
                ? `<p class="art-price">${escapeHtml(work.price)}</p>`
                : `<p class="art-price sin-precio">Precio a consultar</p>`;

            card.innerHTML = `
                <img src="${work.dataUrl}" alt="${escapeHtml(work.title)}">
                <div class="art-info">
                    <p class="art-title">${escapeHtml(work.title || 'Sin título')}</p>
                    ${priceHtml}
                </div>
                <button class="delete-btn" data-index="${index}" title="Eliminar obra">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
                    </svg>
                </button>
            `;

            card.querySelector('.delete-btn').addEventListener('click', () => deleteWork(index));
            gallery.appendChild(card);
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g,'&amp;')
                .replace(/</g,'&lt;')
                .replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;');
        }

        // ── DELETE ───────────────────────────────────────────────
        function deleteWork(index) {
            if (!confirm('¿Eliminar esta obra de la galería?')) return;
            const works = loadWorks();
            works.splice(index, 1);
            saveWorks(works);
            renderAll();
        }

        // ── FILE INPUT ───────────────────────────────────────────
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;

            const reader = new FileReader();
            reader.onload = function(ev) {
                pendingDataUrl = ev.target.result;
                modalPreview.src = pendingDataUrl;
                inputTitle.value = '';
                inputPrice.value = '';
                modalOverlay.classList.add('active');
                setTimeout(() => inputTitle.focus(), 100);
            };
            reader.readAsDataURL(file);
            fileInput.value = '';
        });

        // ── MODAL ACTIONS ────────────────────────────────────────
        btnAdd.addEventListener('click', () => {
            if (!pendingDataUrl) return;
            const works = loadWorks();
            works.push({
                dataUrl: pendingDataUrl,
                title: inputTitle.value.trim() || 'Sin título',
                price: inputPrice.value.trim()
            });
            saveWorks(works);
            renderAll();
            closeModal();
        });

        btnCancel.addEventListener('click', closeModal);

        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
            if (e.key === 'Enter' && modalOverlay.classList.contains('active')) btnAdd.click();
        });

        function closeModal() {
            modalOverlay.classList.remove('active');
            pendingDataUrl = null;
        }

        // ── INIT ─────────────────────────────────────────────────
        renderAll();
    </script>
</body>
</html>
